name: Gunluk Yemek Botu

on:
  schedule:
    - cron: '0 6 * * *' # Her gün UTC 06:00 (TSİ 09:00)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yukle
        run: pip install requests

      - name: Botu Calistir
        run: python yemek_botu.py
