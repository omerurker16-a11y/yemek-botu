name: Gunluk Yemek Botu

on:
  workflow_dispatch: # Manuel çalıştırma butonunu aktif tutar
  schedule:
    - cron: '0 3 * * *' # Her gün UTC 03:00 (Yoğunluğa göre TSİ 09:00 - 09:15 arası tetiklenir)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yukle
        run: pip install requests

      - name: Botu Calistir
        run: python yemek_botu.py
